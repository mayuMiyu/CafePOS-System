<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maku Cafe</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="intro-running">
    <div id="loginIntro" class="login-intro" aria-hidden="true">
        <div class="intro-grain"></div>
        <div class="intro-stage">
            <div class="intro-logo-shell">
                <img class="intro-logo intro-logo-image" src="assets/products/maku icon.png" alt="Maku Cafe logo">
            </div>
            <p class="intro-copy intro-copy-leisure">Coffee, served at your leisure</p>
            <p class="intro-copy intro-copy-brand">Maku Cafe</p>
        </div>
    </div>

    <main>
        <div id="scene">
            <img id="background" src="assets/background.png" alt="Cafe background">
            <div id="donut-wrapper">
            <img id="donut" src="assets/assetscafe.png" alt="Donut">
            <span id="lefteye" class="mascot-eye" aria-hidden="true"><span class="mascot-pupil"></span></span>
            <span id="righteye" class="mascot-eye" aria-hidden="true"><span class="mascot-pupil"></span></span>
            </div>

            <div id = "LoginForm">
                <form id="LoginFormContent" class="form">
                    <h1> Login </h1>

                    <div class = "input-group">
                        <input type = "text" name = "username" class = "box" placeholder = " " autocomplete="off">
                        <label>Username</label>
                    </div>

                    <div class = "input-group">
                        <input type = "password" name = "password" class = "box" placeholder = " " autocomplete="off">
                        <label>Password</label>
                    </div>

                    <h4><a href = "#" >Forgot Password?</a> </h4>

                    <button type = "submit" value = "Login" class = "submit"> Login
                    </button>

                    <h5> Don't have an account? <a href="#">Register</a> </h5>
                </form> 
            </div>

            <div id="forgotCard" class="form">
                <h1>Reset Password</h1>

                <div class="input-group">
                    <input type="email" id="forgot-email" class="box" placeholder=" " autocomplete="off">
                    <label>Email</label>
                </div>

                <div class="code-row">
                    <div class="input-group code-input">
                        <input type="text" id="forgot-code" class="box" placeholder=" " autocomplete="off" maxlength="6">
                        <label>Verification Code</label>
                    </div>
                    <button type="button" id="forgotSendCodeBtn" class="send-code-btn">Send Code</button>
                </div>

                <div class="input-group">
                    <input type="password" id="forgot-newpassword" class="box" placeholder=" " autocomplete="off">
                    <label>New Password</label>
                </div>

                <div class="input-group">
                    <input type="password" id="forgot-confirmpassword" class="box" placeholder=" " autocomplete="off">
                    <label>Confirm Password</label>
                </div>

                <button type="button" id="resetPasswordBtn" class="submit">Reset Password</button>

                <h5>Remembered it? Login <a href="#" id="backToLoginFromForgot">here</a></h5>
            </div>

            <!-- Registration Overlay -->
            <div id="registerOverlay">
                <div id="registerCard" class="form">
                    <button class="back-btn" id="closeRegister">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h1>Register</h1>

                    <div class="input-group">
                        <input type="text" id="reg-username" class="box" placeholder=" " autocomplete="off">
                        <label>Username</label>
                    </div>

                    <div class="input-group">
                        <input type="text" id="reg-name" class="box" placeholder=" " autocomplete="off">
                        <label>Name</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="reg-password" class="box" placeholder=" " autocomplete="off">
                        <label>Password</label>
                    </div>

                    <div class="input-group">
                        <input type="email" id="reg-email" class="box" placeholder=" " autocomplete="off">
                        <label>Email</label>
                    </div>

                    <div class="code-row">
                        <div class="input-group code-input">
                            <input type="text" id="reg-code" class="box" placeholder=" " autocomplete="off" maxlength="6">
                            <label>Verification Code</label>
                        </div>
                        <button type="button" id="sendCodeBtn" class="send-code-btn">Send Code</button>
                    </div>

                    <button type="button" id="registerBtn" class="submit">Register</button>
                </div>
            </div>
        </div>
    </main> 

    <script src="login.js"></script>
    <div id="toast-container"></div>
</body>
</html>
