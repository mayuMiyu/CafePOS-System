<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maku Cafe</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <div id="scene">
            <img id="background" src="assets/background.png" alt="Cafe background">
            <div id="donut-wrapper">
            <img id="donut" src="assets/assetscafe.png" alt="Donut">
            <img id="lefteye" src="assets/assetscafe - eyes.png" alt="Left Eye">
            <img id="righteye" src="assets/assetscafe - eyes.png" alt="Right Eye">
            </div>

            <div id = "LoginForm">
                <form action = "" class = form>
                <h1> Login </h1>

                <div class = "input-group">
                    <input type = "text" name = "username" class = "box" placeholder = " " autocomplete="off">
                    <label>Username</label>
                </div>

                <div class = "input-group">
                    <input type = "password" name = "password" class = "box" placeholder = " " autocomplete="off">
                    <label>Password</label>
                </div>

                <h4><a href = "#" >Forgot Password?</a> </h4>

                <button type = "submit" value = "Login" class = "submit"> Login
                </button>

                <h5> Don't have an account? <a href="#">Register</a> </h5>

                </form> 
            </div>
        </div>
    </main> 

    <script src="login.js"></script>

</body>
</html>
