<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maku Cafe Cashier</title>
  <link rel="stylesheet" href="cashier.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="../models/assets/maku icon.png" alt="Maku Cafe Logo">
      </div>

      <div class="nav">
        <button class="nav-item active" type="button" aria-label="Orders">
          <img src = "../models/assets/icons8-order-24.png">
          <span>Orders</span>
        </button>

        <button class="nav-item" type="button" aria-label="Profile">
          <img src = "../models/assets/profile icon.png">
          <span>Profile</span>
        </button>

        <button class="nav-item" type="button" aria-label="Logout">
          <img src = "../models/assets/icons8-logout-32.png">
          <span>Logout</span>
        </button>
      </div>

      <div class="profile">
        <div class="avatar">JD</div>
        <div class="profile-name">John</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title">Cashier</div>
        <div class = "topbar-actions">
          <div class = "search-wrap"> 
            <img class = "search-icon" src = "../models/assets/icons8-search-30.png" alt = "Search">
            <input class="search" type="text" placeholder="Search items..." />
          </div>
          <div class = "clock-wrap" >
            <img class = "clock-icon" src = "../models/assets/clock.svg" alt = ''>
            <span id = "realtime-clock">--:--:-- --</span>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="center">
          <div class="section-card">
            <div class="section-head">
              <h2>Navigation</h2>
            </div>

            <div class="section-grid">
              <div class="section-button orders">
                <svg viewBox="0 0 24 24">
                  <path d="M4 6h16l-2 12H6L4 6z"></path>
                  <path d="M9 6a3 3 0 0 1 6 0"></path>
                </svg>
                <span>Orders</span>
              </div>

              <div class="section-button profilebtn">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="8" r="4"></circle>
                  <path d="M4 20c1.8-3.5 5-5 8-5s6.2 1.5 8 5"></path>
                </svg>
                <span>Profile</span>
              </div>

              <div class="section-button logoutbtn">
                <svg viewBox="0 0 24 24">
                  <path d="M10 17l5-5-5-5"></path>
                  <path d="M15 12H3"></path>
                  <path d="M21 3v18"></path>
                </svg>
                <span>Logout</span>
              </div>

              <div class="section-button">
                <svg viewBox="0 0 24 24">
                  <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                  <path d="M7 8h10"></path>
                  <path d="M7 12h6"></path>
                </svg>
                <span>Cashier</span>
              </div>
            </div>
          </div>
        </div>

        <aside class="side-panel">
          <div class="quick-panel-box">
            <p>Quick Actions</p>

            <div class="quick-actions-grid">
              <button type="button" id="discount-button" class="quick-action discountbtn">
                <img class = 'quick-action-img' src = "../models/assets/icons8-discount-48.png">
                <span>Discount</span>
              </button>

              <button type="button" id="notes-button" class="quick-action notesbtn">
                <img class="quick-action-img" src="../models/assets/icons8-note-48.svg" alt="">
                <span>Notes</span>
              </button>
            </div>
          </div>



          <div class="order-box">
            <div class="order-header">
              <h3>Current Order</h3>
              <p>0 item(s)</p>
            </div>

            <div class="order-empty">
              <p>No items in cart</p>
              <span>Add items from menu</span>
            </div>

            <div class="order-summary">
              <div class="summary-row">
                <span>Subtotal:</span>
                <span>₱0.00</span>
              </div>

              <div class="summary-row">
                <span>Tax (12%):</span>
                <span>₱0.00</span>
              </div>

              <div class="summary-row total-row">
                <span>Total:</span>
                <span>₱0.00</span>
              </div>
            </div>

            <div class="order-actions">
              <div class="order-action-row">
                <button type="button" class="order-action hold-btn">Hold</button>
                <button type="button" class="order-action clear-btn">Clear</button>
              </div>

              <button type="button" class="checkout-btn">Checkout - ₱0.00</button>
            </div>
          </div>

        </aside>
      </section>
    </main>
  </div>
  <script src = "cashier.js"></script>
</body>
</html>
