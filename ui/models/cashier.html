<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maku Cafe Cashier</title>
  <link rel="stylesheet" href="cashier.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="/assets/maku icon.png" alt="Maku Cafe Logo">
      </div>

      <div class="nav">
        <button class="nav-item active" type="button" aria-label="Orders">
          <img src = "/assets/icons8-order-24.png">
          <span>Orders</span>
        </button>

        <button class="nav-item" type="button" aria-label="Profile" onclick="window.location.href='/profile.html'">
          <img src = "/assets/profile icon.png">
          <span>Profile</span>
        </button>

        <button class="nav-item" type="button" aria-label="Logout">
          <img src = "/assets/icons8-logout-32.png">
          <span>Logout</span>
        </button>
      </div>

      <div class="profile">
        <div class="avatar">JD</div>
        <div class="profile-name">John</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title">Cashier</div>
        <div class = "topbar-actions">
          <div class = "search-wrap"> 
            <img class = "search-icon" src = "/assets/icons8-search-30.png" alt = "Search">
            <input class="search" type="text" placeholder="Search items..." />
          </div>
          <div class = "clock-wrap" >
            <img class = "clock-icon" src = "/assets/clock.svg" alt = ''>
            <span id = "realtime-clock">--:--:-- --</span>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="center">
          <div class="section-card">
            
            <div class = "category-row">
              <button type = "button" id = 'all-btn' class = 'category-all-btn' data-category = 'all'>
                <img class = 'btn-icon all-btn-icon' src = "/assets/icons8-online-store-64.png">
                <span>All</span>
                <span class = 'badge' id = 'badge-all'></span>
              </button>

              <button type = "button" id = 'coffee-btn' class = 'category-btn' data-category = '1'>
                <img class = 'btn-icon' src = "/assets/icons8-cafe-96.png">
                <span>Coffee</span>
                <span class = 'badge' id = 'badge-1'></span>
              </button> 

              <button type = "button" id = 'food-btn' class = 'category-btn' data-category = '2'>
                <img class = 'btn-icon' src = "/assets/icons8-greek-salad-64.png">
                <span>Food</span>
                <span class = 'badge' id = 'badge-2'></span>
              </button>

              <button type = "button" id = 'dessert-btn' class = 'category-btn' data-category = '3'>
                <img class = 'btn-icon' src = "/assets/icons8-cherry-cheesecake-64.png">
                <span>Desert</span>
                <span class = 'badge' id = 'badge-3'></span>
              </button>

              <button type = "button" id = 'beverage-btn' class = 'category-btn' data-category = '4'>
                <img class = 'btn-icon' src = "/assets/icons8-kawaii-soda-64.png">
                <span>Beverage</span>
                <span class = 'badge' id = 'badge-4'></span>
              </button> 
            </div>

            <p class="items-count" id="items-count">Showing 0 items</p>
            <div class="product-grid" id="product-grid"></div>
          </div>
        </div>

        <aside class="side-panel">
          <div class="quick-panel-box">
            <p>Quick Actions</p>

            <div class="quick-actions-grid">
              <button type="button" id="discount-button" class="quick-action discountbtn">
                <img class = 'quick-action-img' src = "/assets/icons8-discount-48.png">
                <span>Discount</span>
              </button>

              <button type="button" id="notes-button" class="quick-action notesbtn">
                <img class="quick-action-img" src="/assets/icons8-note-48.svg" alt="">
                <span>Notes</span>
              </button>
            </div>
          </div>



          <div class="order-box">
            <div class="order-header">
              <h3>Current Order</h3>
              <p>0 item(s)</p>
            </div>

            <div class="order-empty">
              <p>No items in cart</p>
              <span>Add items from menu</span>
            </div>

            <div class="order-summary">
              <div class="summary-row">
                <span>Subtotal:</span>
                <span>₱0.00</span>
              </div>

              <div class="summary-row">
                <span>Tax (12%):</span>
                <span>₱0.00</span>
              </div>

              <div class="summary-row total-row">
                <span>Total:</span>
                <span>₱0.00</span>
              </div>
            </div>

            <div class="order-actions">
              <div class="order-action-row">
                <button type="button" class="order-action hold-btn">
                  <img class = "hold-btn-icon" src = "/assets/icons8-pause-50.png" alt = ''>
                  <span>Hold</span>
                </button>
                <button type="button" class="order-action clear-btn">
                  <img class = "clear-btn-icon" src ="/assets/icons8-broom-90.png" alt = ''>
                  <span>Clear</span>
                </button>
              </div>

              <button type="button" class="checkout-btn">
                <img class = "checkout-btn-icon" src = "/assets/icons8-bill-100.png" alt = ''>
                <span>Checkout - ₱0.00</span>
              </button>
            </div>
          </div>

        </aside>
      </section>
    </main>
  </div>
  <script src = "cashier.js"></script>
  <script src = "getproductCategory.js"></script>
</body>
</html>
